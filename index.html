<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>10x10 Bitmap Drawer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
            background: #222;
            color: white;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(10, 35px);
            grid-template-rows: repeat(10, 35px);
            gap: 2px;
            user-select: none;
        }

        .pixel {
            width: 35px;
            height: 35px;
            background: white;
            border: 1px solid #555;
            cursor: pointer;
        }

        .pixel.active {
            background: black;
        }

        button {
            margin-top: 20px;
            padding: 10px 18px;
            font-size: 16px;
            cursor: pointer;
        }

        textarea {
            margin-top: 20px;
            width: 650px;
            height: 150px;
            font-family: monospace;
        }
    </style>
</head>

<body>

    <script>

        function dotProd (vec1, vec2) {
            let total = 0
            for (let i = 0; i < vec1.length; i++) {
                total += vec1[i]*vec2[i]
            }
            return total;
        }
        
        function sum (vec) {
            let final = 0;
            for (let i = 0; i < vec.length; i++) {
                final += vec[i];
            }
            return final;
        }

        function softmax (vec) {
            const final = [];
            const max = Math.max(...vec);
            const reduced = vec.map(x => Math.E ** (x - max));
            const total = sum(reduced);
            for (let i = 0; i < reduced.length; i++) {
                final.push((reduced[i]/total) * 100);
            }
            return final;
        }

        function outputVector() {
            const pixels = document.querySelectorAll(".pixel");

            const vector = [];

            pixels.forEach(pixel => {
                vector.push(pixel.classList.contains("active") ? 1 : 0);
            });
            
            const hidden_output = [];

            for (let i = 0; i < 48; i++) {
                hidden_output.push(Math.max(0, dotProd(vector, hidW[i])  + hidB[i] ));
            }

            const output = [];

            for (let i = 0; i < 26; i++) {
                output.push(
                    dotProd(hidden_output, outW[i]) + outB[i]
                );
            }

            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

            const prob = softmax(output)

            const results = prob.map((p, i) => ({
                letter: letters[i],
                probability: p
            }));

            results.sort((a, b) => b.probability - a.probability);

            console.log(results);

            document.getElementById("output").value =
                results
                    .map(r => `${r.letter}: ${r.probability.toFixed(6)}%`)
                    .join("\n");
        }
